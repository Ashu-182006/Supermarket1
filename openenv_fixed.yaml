name: supermarket-nav
version: "1.0.0"
description: >
  A grid-world supermarket where an LLM agent must navigate aisles,
  collect a shopping list, and return to the checkout counter.
  Difficulty scales from Easy (1 item, 200 steps) to Hard (4 items, 50 steps).

server:
  image: supermart-env          
  build_context: .             
  port: 7860
  healthcheck:
    path: /healthz
    interval_seconds: 5
    timeout_seconds: 2
    retries: 3


task:
  reset_endpoint:  "POST /reset"
  step_endpoint:   "POST /step/{session_id}"
  state_endpoint:  "GET  /state/{session_id}"

  reset_schema:
    level:
      type: string
      enum: [easy, medium, hard]
      default: easy
    products:
      type: array
      items:
        type: string
      description: >
        Optional list of exact product names. Leave null for random selection.
    seed:
      type: integer
      description: Optional RNG seed for reproducibility.

  step_schema:
    action:
      type: integer
      minimum: 0
      maximum: 4
      description: "0=UP  1=DOWN  2=LEFT  3=RIGHT  4=COLLECT"


  reward_field:         step_reward


  score_field:          normalised_score


  terminated_field:     terminated
  truncated_field:      truncated


evaluation:
  tasks:
    - id: task_easy
      level: easy
      seed: 42
      reset_body:
        level: easy
        seed: 42
      grader:
        type: score
        field: normalised_score
        aggregation: mean
        episodes: 10
        clamp: [0.001, 0.999]

    - id: task_medium
      level: medium
      seed: 42
      reset_body:
        level: medium
        seed: 42
      grader:
        type: score
        field: normalised_score
        aggregation: mean
        episodes: 10
        clamp: [0.001, 0.999]

    - id: task_hard
      level: hard
      seed: 42
      reset_body:
        level: hard
        seed: 42
      grader:
        type: score
        field: normalised_score
        aggregation: mean
        episodes: 10
        clamp: [0.001, 0.999]

  metrics:
    - name: normalised_score
      description: "Clamped reward ratio in [0, 1]; 1.0 = perfect episode"
      aggregation: mean

    - name: success_rate
      description: "Fraction of episodes where task_status == Success"
      aggregation: mean

    - name: steps_taken
      description: "Steps used before episode ended"
      aggregation: mean


agent:
  entry_point: "python inference.py"
  args:
    - "--level"
    - "{{ task.level }}"       
    - "--base-url"
    - "http://localhost:7860"
  env:
    HF_TOKEN:     "{{ env.HF_TOKEN }}"
    API_BASE_URL: "{{ env.API_BASE_URL }}"
    MODEL_NAME:   "{{ env.MODEL_NAME }}"


action_space:
  type: discrete
  n: 5
  names: [UP, DOWN, LEFT, RIGHT, COLLECT]
  description: >
    COLLECT is only valid when the agent is standing on an aisle that
    contains a pending target item (action_mask[4] == true).

observation_space:
  type: box
  shape: [16]
  dtype: float32
  low: 0.0
  high: 1.0
  description: >
    [0] agent row (normalised)
    [1] agent col (normalised)
    [2] phase (0=collecting, 1=returning)
    [3] steps_taken / max_steps
    [4-6]  product 1: (row, col, collected)
    [7-9]  product 2: (row, col, collected)
    [10-12] product 3: (row, col, collected)
    [13-15] product 4: (row, col, collected)
